name: CI/CD Pipeline

on:
  push:
    branches: [main, develop, 'feature/**']
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    name: Backend — Tests + Security Scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('backend/requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install bandit safety

      - name: Security scan — Bandit (static analysis)
        run: bandit -r . -x ./tests,./migrations --severity-level medium -f txt || true

      - name: Security scan — Safety (dependency vulnerabilities)
        run: safety check --full-report || true

      - name: Run migrations
        run: python manage.py migrate

      - name: Run tests with coverage
        run: |
          pip install coverage
          coverage run manage.py test --verbosity=2
          coverage report --min-percentage=60

  frontend:
    name: Frontend — Build + Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint || true

      - name: Build
        run: npm run build

  docker:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build ./backend -t warehouse-backend:latest

      - name: Build frontend image
        run: docker build ./frontend -t warehouse-frontend:latest